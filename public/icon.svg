<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B8A252"/>
      <stop offset="100%" stop-color="#8C7830"/>
    </linearGradient>
    <linearGradient id="cabinet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7A9B5A"/>
      <stop offset="100%" stop-color="#5A7A3A"/>
    </linearGradient>
    <linearGradient id="shelf" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C8A85A"/>
      <stop offset="100%" stop-color="#A88838"/>
    </linearGradient>
    <linearGradient id="bread-g" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8C870"/>
      <stop offset="100%" stop-color="#C8983A"/>
    </linearGradient>
  </defs>

  <!-- App icon background: warm tan/golden -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Slight top highlight -->
  <rect width="512" height="220" rx="100" fill="rgba(255,255,255,0.09)"/>
  <!-- Inner border subtle -->
  <rect x="3" y="3" width="506" height="506" rx="97" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="4"/>

  <!-- ═══ LEFT: WHITE FORK ═══ -->
  <g fill="#FFFFFF" opacity="0.95">
    <!-- 4 tines -->
    <rect x="122" y="72" width="14" height="110" rx="7"/>
    <rect x="142" y="72" width="14" height="110" rx="7"/>
    <rect x="162" y="72" width="14" height="110" rx="7"/>
    <rect x="182" y="72" width="14" height="110" rx="7"/>
    <!-- Tine connector arch — filled shape -->
    <path d="M122 168 Q122 196 150 200 Q178 196 196 168 L182 168 Q178 185 150 188 Q122 185 136 168 Z" fill="#FFFFFF"/>
    <!-- Neck -->
    <rect x="141" y="196" width="18" height="60" rx="6"/>
    <!-- Handle -->
    <rect x="133" y="252" width="34" height="188" rx="17"/>
  </g>

  <!-- ═══ RIGHT: PANTRY CABINET ═══ -->

  <!-- Cabinet outer frame (green) -->
  <rect x="268" y="58" width="186" height="396" rx="18" fill="url(#cabinet)"/>

  <!-- Cabinet inner (darker green inset) -->
  <rect x="278" y="68" width="166" height="376" rx="12" fill="#3A5E28"/>

  <!-- Shelf 1 board -->
  <rect x="278" y="212" width="166" height="14" rx="4" fill="url(#shelf)"/>
  <!-- Shelf 2 board -->
  <rect x="278" y="348" width="166" height="14" rx="4" fill="url(#shelf)"/>

  <!-- ── TOP SHELF: jars ── -->
  <!-- Jar 1 -->
  <rect x="292" y="110" width="44" height="96" rx="10" fill="#D8D0A8" opacity="0.88"/>
  <rect x="292" y="102" width="44" height="16" rx="6" fill="#8A6828"/>
  <ellipse cx="314" cy="158" rx="16" ry="22" fill="#5A8840" opacity="0.85"/>
  <rect x="297" y="136" width="34" height="14" rx="3" fill="rgba(255,255,255,0.35)"/>

  <!-- Jar 2 -->
  <rect x="346" y="128" width="38" height="78" rx="9" fill="#D8D0A8" opacity="0.88"/>
  <rect x="346" y="120" width="38" height="14" rx="5" fill="#8A6828"/>
  <ellipse cx="365" cy="170" rx="13" ry="18" fill="#C87830" opacity="0.85"/>

  <!-- Jar 3 / tin -->
  <rect x="396" y="120" width="36" height="86" rx="8" fill="#B03828" opacity="0.9"/>
  <rect x="396" y="112" width="36" height="14" rx="5" fill="#882010"/>
  <rect x="401" y="134" width="26" height="10" rx="3" fill="rgba(255,255,255,0.28)"/>
  <rect x="401" y="150" width="26" height="6" rx="2" fill="rgba(255,255,255,0.18)"/>

  <!-- ── MIDDLE SHELF: bread + tomato ── -->
  <!-- Bread loaf -->
  <ellipse cx="328" cy="296" rx="46" ry="34" fill="url(#bread-g)"/>
  <!-- bread score marks -->
  <path d="M292 290 Q328 276 364 290" stroke="#A07828" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M298 304 Q328 291 358 304" stroke="#A07828" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- bread top highlight -->
  <ellipse cx="318" cy="278" rx="22" ry="10" fill="rgba(255,255,255,0.15)"/>

  <!-- Tomato -->
  <circle cx="406" cy="294" r="28" fill="#C83020"/>
  <ellipse cx="396" cy="280" rx="9" ry="7" fill="rgba(255,255,255,0.22)"/>
  <!-- stem -->
  <path d="M406 266 Q411 256 417 262" stroke="#3A7828" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M406 266 Q401 254 395 261" stroke="#3A7828" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M406 266 Q406 256 406 260" stroke="#3A7828" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- ── BOTTOM SHELF: pasta box + bottle ── -->
  <!-- Pasta box -->
  <rect x="288" y="374" width="52" height="84" rx="8" fill="#E8C840"/>
  <rect x="293" y="380" width="42" height="16" rx="4" fill="rgba(255,255,255,0.4)"/>
  <rect x="296" y="402" width="32" height="5" rx="2" fill="rgba(0,0,0,0.15)"/>
  <rect x="296" y="412" width="24" height="5" rx="2" fill="rgba(0,0,0,0.1)"/>

  <!-- Olive oil bottle -->
  <rect x="352" y="364" width="30" height="92" rx="8" fill="#A8C050" opacity="0.92"/>
  <rect x="357" y="354" width="20" height="14" rx="5" fill="#88A038"/>
  <rect x="360" y="346" width="14" height="12" rx="4" fill="#708830"/>
  <rect x="354" y="406" width="26" height="48" rx="0 0 8 8" fill="#88A038" opacity="0.55"/>

  <!-- Can -->
  <rect x="394" y="372" width="42" height="80" rx="9" fill="#5878A0" opacity="0.9"/>
  <ellipse cx="415" cy="372" rx="21" ry="7" fill="#7898C0"/>
  <ellipse cx="415" cy="452" rx="21" ry="7" fill="#4868A0"/>
  <rect x="399" y="390" width="32" height="12" rx="3" fill="rgba(255,255,255,0.28)"/>
  <rect x="403" y="408" width="24" height="8" rx="2" fill="rgba(255,255,255,0.18)"/>
</svg>