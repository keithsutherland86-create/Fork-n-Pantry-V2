<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B9B3E"/>
      <stop offset="60%" stop-color="#7A8A32"/>
      <stop offset="100%" stop-color="#5C6B20"/>
    </linearGradient>
    <linearGradient id="shelf-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C8A86B"/>
      <stop offset="100%" stop-color="#A88848"/>
    </linearGradient>
    <linearGradient id="cream" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5EDD8"/>
      <stop offset="100%" stop-color="#E8D8B8"/>
    </linearGradient>
    <linearGradient id="bread" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8C878"/>
      <stop offset="100%" stop-color="#C8A848"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Subtle top shine -->
  <rect width="512" height="200" rx="108" fill="rgba(255,255,255,0.07)"/>

  <!-- Divider line down the middle -->
  <rect x="254" y="60" width="4" height="392" rx="2" fill="rgba(255,255,255,0.15)"/>

  <!-- ═══ LEFT SIDE: FORK ═══ -->

  <!-- Fork handle -->
  <rect x="148" y="220" width="36" height="168" rx="18" fill="url(#cream)"/>

  <!-- Fork neck -->
  <rect x="157" y="156" width="18" height="72" rx="6" fill="url(#cream)"/>

  <!-- Fork tines (4) -->
  <rect x="138" y="68" width="10" height="100" rx="5" fill="url(#cream)"/>
  <rect x="152" y="68" width="10" height="100" rx="5" fill="url(#cream)"/>
  <rect x="166" y="68" width="10" height="100" rx="5" fill="url(#cream)"/>
  <rect x="180" y="68" width="10" height="100" rx="5" fill="url(#cream)"/>

  <!-- Tine base connector -->
  <rect x="138" y="154" width="52" height="14" rx="5" fill="url(#cream)"/>

  <!-- ═══ RIGHT SIDE: PANTRY SHELF ═══ -->

  <!-- Shelf frame / cupboard -->
  <rect x="282" y="58" width="172" height="396" rx="14" fill="rgba(0,0,0,0.18)"/>
  <rect x="286" y="62" width="164" height="388" rx="12" fill="url(#shelf-bg)"/>

  <!-- Shelf board 1 (top) -->
  <rect x="286" y="188" width="164" height="12" rx="3" fill="#8B6830"/>
  <!-- Shelf board 2 (middle) -->
  <rect x="286" y="318" width="164" height="12" rx="3" fill="#8B6830"/>

  <!-- ── Top shelf items ── -->

  <!-- Jar left (tall) -->
  <rect x="300" y="108" width="38" height="76" rx="8" fill="#E8E0C8" opacity="0.9"/>
  <rect x="300" y="104" width="38" height="14" rx="4" fill="#C8A848"/>
  <!-- jar contents (green herbs) -->
  <ellipse cx="319" cy="148" rx="14" ry="18" fill="#6A9A5A" opacity="0.8"/>
  <!-- jar label -->
  <rect x="305" y="130" width="28" height="16" rx="3" fill="rgba(255,255,255,0.4)"/>

  <!-- Jar right (shorter) -->
  <rect x="350" y="124" width="34" height="60" rx="7" fill="#E8E0C8" opacity="0.9"/>
  <rect x="350" y="120" width="34" height="12" rx="4" fill="#C8A848"/>
  <!-- jar contents (orange lentils) -->
  <ellipse cx="367" cy="158" rx="12" ry="14" fill="#D4843A" opacity="0.85"/>

  <!-- Spice tin -->
  <rect x="396" y="130" width="40" height="54" rx="6" fill="#C04830" opacity="0.9"/>
  <rect x="396" y="126" width="40" height="12" rx="4" fill="#A03820"/>
  <rect x="401" y="138" width="30" height="10" rx="2" fill="rgba(255,255,255,0.3)"/>

  <!-- ── Middle shelf items ── -->

  <!-- Bread loaf -->
  <ellipse cx="330" cy="285" rx="42" ry="28" fill="url(#bread)"/>
  <!-- bread top scoring lines -->
  <path d="M300 278 Q330 268 360 278" stroke="#A07830" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M308 290 Q330 280 352 290" stroke="#A07830" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Tomato -->
  <circle cx="400" cy="284" r="26" fill="#D03828"/>
  <!-- tomato shine -->
  <ellipse cx="390" cy="272" rx="8" ry="6" fill="rgba(255,255,255,0.25)"/>
  <!-- tomato stem -->
  <path d="M400 258 Q404 250 408 255" stroke="#4A8A30" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M400 258 Q396 248 392 254" stroke="#4A8A30" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- ── Bottom shelf items ── -->

  <!-- Pasta box -->
  <rect x="298" y="338" width="46" height="98" rx="6" fill="#E8D070"/>
  <rect x="303" y="344" width="36" height="18" rx="3" fill="rgba(255,255,255,0.4)"/>
  <rect x="306" y="368" width="30" height="4" rx="2" fill="rgba(0,0,0,0.15)"/>
  <rect x="306" y="376" width="22" height="4" rx="2" fill="rgba(0,0,0,0.1)"/>

  <!-- Oil bottle -->
  <rect x="358" y="348" width="28" height="84" rx="6" fill="#C8D890" opacity="0.9"/>
  <rect x="362" y="340" width="20" height="14" rx="4" fill="#A0B068"/>
  <rect x="366" y="334" width="12" height="10" rx="3" fill="#889850"/>
  <!-- oil liquid level -->
  <rect x="360" y="390" width="24" height="40" rx="0 0 6 6" fill="#A8B858" opacity="0.6"/>

  <!-- Small tin/can -->
  <rect x="398" y="356" width="38" height="70" rx="8" fill="#6888B8" opacity="0.9"/>
  <ellipse cx="417" cy="356" rx="19" ry="6" fill="#8898C8"/>
  <ellipse cx="417" cy="426" rx="19" ry="6" fill="#5878A8"/>
  <rect x="403" y="372" width="28" height="12" rx="3" fill="rgba(255,255,255,0.3)"/>
</svg>